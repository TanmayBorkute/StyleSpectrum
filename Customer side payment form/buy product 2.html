<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Spectrum - Cart & Transaction</title>
    <!-- Font Awesome CDN for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cart-section">
        <h2>Your Shopping Cart</h2>

        <!-- Cart Items -->
        <div id="cart-items">
            <div class="cart-item" data-price="17.24">
                <p>PS England Jacket</p>
                <p>Price: $17.24</p>
                <label for="quantity2">Quantity:</label>
                <input type="number" id="quantity2" min="1" value="1" onchange="updateTotal()">
                <i class="fas fa-trash delete-icon" onclick="removeItem(this)"></i>
            </div>
        </div>

        <!-- Total Price -->
        <div class="cart-total">
            <h3>Total: $<span id="total-price">0</span></h3>
        </div>

        <!-- Checkout Button -->
        <button onclick="showTransactionSection()">Proceed to Checkout</button>
    </div>

    <!-- Transaction Section -->
    <div class="transaction-section" id="transaction-section" style="display:none;">
        <h2>Complete Your Purchase</h2>
        
        <!-- Order Summary -->
        <div class="order-summary">
            <h3>Order Summary</h3>
            <p>Items: <span id="total-items">0</span></p>
            <p>Total Price: $<span id="order-total">0</span></p>
        </div>

        <!-- Shipping Information -->
        <div class="shipping-info">
            <h3>Shipping Information</h3>
            <form id="shipping-form">
                <label for="name">Full Name</label>
                <input type="text" id="name" required>

                <label for="address">Address</label>
                <input type="text" id="address" required>

                <label for="city">City</label>
                <input type="text" id="city" required>

                <label for="postal-code">Postal Code</label>
                <input type="text" id="postal-code" required>
                
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" required>
            </form>
        </div>

        <!-- Payment Information -->
        <div class="payment-info">
            <h3>Payment Information</h3>
            <form id="payment-form">
                <label for="card-number">Card Number</label>
                <input type="text" id="card-number" required maxlength="16" placeholder="1234 5678 9012 3456">

                <label for="expiry-date">Expiry Date</label>
                <input type="text" id="expiry-date" required placeholder="MM/YY">

                <label for="cvv">CVV</label>
                <input type="text" id="cvv" required maxlength="3" placeholder="123">

                <button type="submit" onclick="completeTransaction(event)">Complete Purchase</button>
            </form>
        </div>
    </div>

    <!-- Success Message -->
    <div id="success-message" class="success-message" style="display:none;">
        <i class="fas fa-check-circle"></i>
        <h3>Transaction Completed!</h3>
        <p>Thank you for shopping with Style Spectrum.</p>
    </div>

    <script>
        function updateTotal() {
            let total = 0;
            let totalItems = 0;
            const cartItems = document.querySelectorAll(".cart-item");

            cartItems.forEach(item => {
                const price = parseFloat(item.getAttribute("data-price"));
                const quantity = parseInt(item.querySelector("input[type='number']").value);
                total += price * quantity;
                totalItems += quantity;
            });

            document.getElementById("total-price").innerText = total;
            document.getElementById("order-total").innerText = total;
            document.getElementById("total-items").innerText = totalItems;
        }

        function removeItem(icon) {
            const item = icon.closest(".cart-item");
            item.remove();
            updateTotal();
        }

        function showTransactionSection() {
            document.querySelector(".cart-section").style.display = "none";
            document.getElementById("transaction-section").style.display = "block";
        }

        function completeTransaction(event) {
            event.preventDefault();  // Prevent form submission for the demo

            // Hide the transaction section
            document.getElementById("transaction-section").style.display = "none";
            
            // Show the success message with animation
            const successMessage = document.getElementById("success-message");
            successMessage.style.display = "block";
            
            // Animation effect
            successMessage.classList.add('fade-in');
        }

        window.onload = updateTotal;
    </script>

</body>
</html>
