<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Section</title>
    <link rel="stylesheet" href="styles.css"> <!-- Optional for any CSS styling -->
</head>
<body>
    <h1>Transaction Section</h1>

    <!-- Transaction Form -->
    <form id="transactionForm">
        <label for="amount">Amount:</label>
        <input type="number" id="amount" required>

        <label for="paymentMethod">Payment Method:</label>
        <select id="paymentMethod" required>
            <option value="credit">Credit Card</option>
            <option value="debit">Debit Card</option>
            <option value="crypto">Cryptocurrency</option>
            <option value="upi">UPI Apps</option>
        </select>

        <label for="transactionId">Transaction ID:</label>
        <input type="text" id="transactionId" required>

        <button type="submit">Submit</button>
    </form>

    <!-- Transaction History -->
    <h2>Transaction History</h2>
    <table id="transactionHistory">
        <tr>
            <th>Amount</th>
            <th>Payment Method</th>
            <th>Transaction ID</th>
        </tr>
    </table>

    <!-- JavaScript file link -->
    <script src="script.js"></script>
</body>
</html>
